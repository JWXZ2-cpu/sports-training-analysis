<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>脉 MAI — 产品海报</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', sans-serif;
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 12px;
  }

  .poster {
    width: 750px;
    height: 1200px;
    background: #0D0C0A;
    position: relative;
    overflow: hidden;
  }

  .poster::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 20;
    opacity: 0.02;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .glow { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }
  .glow-1 { width: 400px; height: 400px; background: rgba(212,164,76,0.06); top: -80px; left: -80px; }
  .glow-2 { width: 300px; height: 300px; background: rgba(42,36,22,0.3); bottom: -60px; right: -60px; }

  /* 截图网格 — 有序交错 */
  .screenshots {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-content: center;
    gap: 0;
    padding: 20px;
  }

  .screenshot {
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.08);
    opacity: 0.5;
  }

  .screenshot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* 三行布局，每行略有交错 */
  .row {
    display: flex;
    justify-content: center;
    gap: 12px;
    width: 100%;
  }

  .row-1 { margin-bottom: -20px; }
  .row-2 { margin-bottom: -20px; }
  .row-3 {}

  .row-1 .screenshot { width: 200px; height: 360px; }
  .row-2 .screenshot { width: 210px; height: 370px; }
  .row-3 .screenshot { width: 195px; height: 350px; }

  .row-1 .s1 { transform: rotate(-2deg); opacity: 0.45; }
  .row-1 .s2 { transform: rotate(1deg); opacity: 0.55; }
  .row-1 .s3 { transform: rotate(2deg); opacity: 0.45; }

  .row-2 .s4 { transform: rotate(1deg); opacity: 0.5; }
  .row-2 .s5 { transform: rotate(-1deg); opacity: 0.6; }
  .row-2 .s6 { transform: rotate(2deg); opacity: 0.5; }

  .row-3 .s7 { transform: rotate(-1deg); opacity: 0.5; }

  /* 中央内容 */
  .content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    width: 100%;
    padding: 0 40px;
  }

  .logo-icon {
    width: 72px;
    height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, #D4A44C, #C08830);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    box-shadow: 0 0 40px rgba(212,164,76,0.3);
  }
  .logo-icon svg { width: 34px; height: 34px; }

  .mai-text {
    font-size: 15px;
    font-weight: 400;
    color: #B8B2A8;
    letter-spacing: 0.12em;
    margin-bottom: 20px;
  }
  .mai-text span { opacity: 0.9; }

  .slogan {
    font-size: 15px;
    font-weight: 300;
    color: #B8B2A8;
    letter-spacing: 0.3em;
    margin-bottom: 6px;
  }
  .slogan-en {
    font-size: 11px;
    font-weight: 300;
    color: rgba(184,178,168,0.5);
    letter-spacing: 0.1em;
  }

  /* 底部 */
  .footer {
    position: absolute;
    bottom: 36px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 10;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: rgba(212,164,76,0.3);
    margin: 0 auto 14px;
  }

  .qr-code {
    width: 90px;
    height: 90px;
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-code img { width: 100%; height: 100%; object-fit: contain; }

  .url-text {
    font-size: 13px;
    font-weight: 500;
    color: #D4A44C;
    letter-spacing: 0.08em;
  }
  .tagline {
    margin-top: 6px;
    font-size: 10px;
    font-weight: 300;
    color: rgba(184,178,168,0.4);
  }
</style>
</head>
<body>

<div class="poster">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <!-- 截图层：三行有序排列 -->
  <div class="screenshots">
    <div class="row row-1">
      <div class="screenshot s1"><img src="s1.png" alt=""></div>
      <div class="screenshot s2"><img src="s2.png" alt=""></div>
      <div class="screenshot s3"><img src="s3.png" alt=""></div>
    </div>
    <div class="row row-2">
      <div class="screenshot s4"><img src="s4.png" alt=""></div>
      <div class="screenshot s5"><img src="s5.png" alt=""></div>
      <div class="screenshot s6"><img src="s6.png" alt=""></div>
    </div>
    <div class="row row-3">
      <div class="screenshot s7"><img src="s7.png" alt=""></div>
    </div>
  </div>

  <!-- 中央内容 -->
  <div class="content">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0D0C0A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
      </svg>
    </div>
    <div class="mai-text">M<span>ovement</span> · A<span>nalysis</span> · I<span>ntelligence</span></div>
    <div class="slogan">你的训练，脉络清晰</div>
    <div class="slogan-en">Your Training, Crystal Clear</div>
  </div>

  <!-- 底部 -->
  <div class="footer">
    <div class="divider"></div>
    <div class="qr-code">
      <img src="qr新.png" alt="QR Code">
    </div>
    <div class="url-text">maisport.cn</div>
    <div class="tagline">AI 驱动的专业运动训练分析平台</div>
  </div>
</div>

</body>
</html>
