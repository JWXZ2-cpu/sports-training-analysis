<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>脉 MAI — 产品海报</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', sans-serif;
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 0;
  }

  .poster {
    width: 750px;
    height: 1200px;
    background: #0D0C0A;
    position: relative;
    overflow: hidden;
  }

  .poster::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 20;
    opacity: 0.02;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .glow { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 2; }
  .glow-1 { width: 500px; height: 500px; background: rgba(212,164,76,0.06); top: 30%; left: 50%; transform: translate(-50%, -50%); }
  .glow-2 { width: 300px; height: 300px; background: rgba(42,36,22,0.3); bottom: -60px; right: -60px; }

  /* 截图背景层 */
  .screenshots {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 14px;
    padding: 30px 10px 20px;
  }

  .row {
    display: flex;
    justify-content: center;
    gap: 14px;
    width: 100%;
  }

  .screenshot {
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 35px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.08);
    opacity: 0.5;
  }

  .screenshot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* 第一行 3 张 */
  .row-1 .screenshot { width: 230px; height: 420px; }
  .row-1 .s1 { transform: rotate(-2deg); opacity: 0.6; }
  .row-1 .s2 { transform: rotate(1deg); opacity: 0.7; }
  .row-1 .s3 { transform: rotate(2deg); opacity: 0.65; }

  /* 第二行 3 张 */
  .row-2 .screenshot { width: 230px; height: 420px; }
  .row-2 .s4 { transform: rotate(1deg); opacity: 0.65; }
  .row-2 .s5 { transform: rotate(-2deg); opacity: 0.7; }
  .row-2 .s6 { transform: rotate(1deg); opacity: 0.6; }

  /* 暗角遮罩 */
  .vignette {
    position: absolute;
    inset: 0;
    z-index: 3;
    background:
      radial-gradient(ellipse at center, transparent 30%, rgba(13,12,10,0.7) 100%);
    pointer-events: none;
  }

  /* 中央内容 */
  .content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    width: 100%;
    padding: 0 40px;
  }

  .logo-icon {
    width: 100px;
    height: 100px;
    border-radius: 28px;
    background: linear-gradient(135deg, #D4A44C, #C08830);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    box-shadow: 0 0 60px rgba(212,164,76,0.4);
    position: relative;
  }
  .logo-icon::after {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 36px;
    background: linear-gradient(135deg, rgba(212,164,76,0.2), transparent);
    filter: blur(20px);
    z-index: -1;
  }
  .logo-icon svg { width: 48px; height: 48px; }

  .mai-text {
    font-size: 26px;
    font-weight: 600;
    color: #F0E8D8;
    letter-spacing: 0.12em;
    margin-bottom: 28px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.9);
  }
  .mai-text span { opacity: 1; }

  .slogan {
    font-size: 24px;
    font-weight: 500;
    color: #F0E8D8;
    letter-spacing: 0.3em;
    margin-bottom: 10px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.9);
  }
  .slogan-en {
    font-size: 16px;
    font-weight: 400;
    color: rgba(240,232,216,0.7);
    letter-spacing: 0.1em;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
  }

  /* 底部 */
  .footer {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 10;
  }

  .divider {
    width: 50px;
    height: 1px;
    background: rgba(212,164,76,0.4);
    margin: 0 auto 16px;
  }

  .qr-code {
    width: 140px;
    height: 140px;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-code img { width: 100%; height: 100%; object-fit: contain; }

  .url-text {
    font-size: 20px;
    font-weight: 600;
    color: #D4A44C;
    letter-spacing: 0.1em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
  }
  .tagline {
    margin-top: 10px;
    font-size: 15px;
    font-weight: 400;
    color: rgba(212,200,176,0.8);
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

<div class="poster">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <!-- 截图背景：上三下三 -->
  <div class="screenshots">
    <div class="row row-1">
      <div class="screenshot s1"><img src="s1.png" alt=""></div>
      <div class="screenshot s2"><img src="s2.png" alt=""></div>
      <div class="screenshot s3"><img src="s3.png" alt=""></div>
    </div>
    <div class="row row-2">
      <div class="screenshot s4"><img src="s4.png" alt=""></div>
      <div class="screenshot s5"><img src="s5.png" alt=""></div>
      <div class="screenshot s6"><img src="s6.png" alt=""></div>
    </div>
  </div>

  <!-- 暗角遮罩 -->
  <div class="vignette"></div>

  <!-- 中央内容 -->
  <div class="content">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0D0C0A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
      </svg>
    </div>
    <div class="mai-text">M<span>ovement</span> · A<span>nalysis</span> · I<span>ntelligence</span></div>
    <div class="slogan">你的训练，脉络清晰</div>
    <div class="slogan-en">Your Training, Crystal Clear</div>
  </div>

  <!-- 底部 -->
  <div class="footer">
    <div class="divider"></div>
    <div class="qr-code">
      <img src="qr新.png" alt="QR Code">
    </div>
    <div class="url-text">maisport.cn</div>
    <div class="tagline">AI 驱动的专业运动训练分析平台</div>
  </div>
</div>

</body>
</html>
