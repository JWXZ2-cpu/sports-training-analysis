<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>脉 MAI — 产品海报</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', sans-serif;
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 12px;
  }

  .poster {
    width: 750px;
    height: 1200px;
    background: #0D0C0A;
    position: relative;
    overflow: hidden;
  }

  /* 纹理 */
  .poster::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 20;
    opacity: 0.02;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* 光晕 */
  .glow { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }
  .glow-1 { width: 400px; height: 400px; background: rgba(212,164,76,0.08); top: -80px; left: -80px; }
  .glow-2 { width: 300px; height: 300px; background: rgba(42,36,22,0.4); bottom: -60px; right: -60px; }

  /* 截图层 */
  .screenshots { position: absolute; inset: 0; z-index: 1; }

  .screenshot {
    position: absolute;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 15px 50px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .screenshot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* 截图位置 — 大尺寸、交错重叠 */
  .s1 { width: 240px; top: -20px; left: -30px; transform: rotate(-8deg); z-index: 3; opacity: 0.55; }
  .s2 { width: 220px; top: 10px; right: -20px; transform: rotate(6deg); z-index: 4; opacity: 0.5; }
  .s3 { width: 260px; top: 180px; left: 60px; transform: rotate(3deg); z-index: 5; opacity: 0.6; }
  .s4 { width: 230px; top: 200px; right: 30px; transform: rotate(-5deg); z-index: 6; opacity: 0.55; }
  .s5 { width: 250px; top: 420px; left: -20px; transform: rotate(5deg); z-index: 4; opacity: 0.5; }
  .s6 { width: 220px; top: 440px; right: -10px; transform: rotate(-4deg); z-index: 5; opacity: 0.55; }
  .s7 { width: 200px; top: 620px; left: 80px; transform: rotate(7deg); z-index: 3; opacity: 0.45; }

  /* 中央内容 */
  .content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    width: 100%;
    padding: 0 40px;
  }

  .logo-icon {
    width: 80px;
    height: 80px;
    border-radius: 22px;
    background: linear-gradient(135deg, #D4A44C, #C08830);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    box-shadow: 0 0 40px rgba(212,164,76,0.3);
    position: relative;
  }

  .logo-icon::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 28px;
    background: linear-gradient(135deg, rgba(212,164,76,0.12), transparent);
    filter: blur(16px);
    z-index: -1;
  }

  .logo-icon svg { width: 38px; height: 38px; }

  .mai-text {
    font-size: 16px;
    font-weight: 400;
    color: #B8B2A8;
    letter-spacing: 0.12em;
    margin-bottom: 24px;
  }
  .mai-text span { opacity: 0.9; }

  .slogan {
    font-size: 16px;
    font-weight: 300;
    color: #B8B2A8;
    letter-spacing: 0.3em;
    margin-bottom: 8px;
  }

  .slogan-en {
    font-size: 11px;
    font-weight: 300;
    color: rgba(184,178,168,0.5);
    letter-spacing: 0.12em;
  }

  /* 底部 */
  .footer {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 10;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: rgba(212,164,76,0.3);
    margin: 0 auto 16px;
  }

  .qr-code {
    width: 100px;
    height: 100px;
    background: #fff;
    border-radius: 12px;
    margin: 0 auto 12px;
    padding: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-code img { width: 100%; height: 100%; object-fit: contain; }

  .url-text {
    font-size: 14px;
    font-weight: 500;
    color: #D4A44C;
    letter-spacing: 0.08em;
  }

  .tagline {
    margin-top: 8px;
    font-size: 11px;
    font-weight: 300;
    color: rgba(184,178,168,0.4);
  }
</style>
</head>
<body>

<div class="poster">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <!-- 截图层 -->
  <div class="screenshots">
    <div class="screenshot s1"><img src="s1.png" alt=""></div>
    <div class="screenshot s2"><img src="s2.png" alt=""></div>
    <div class="screenshot s3"><img src="s3.png" alt=""></div>
    <div class="screenshot s4"><img src="s4.png" alt=""></div>
    <div class="screenshot s5"><img src="s5.png" alt=""></div>
    <div class="screenshot s6"><img src="s6.png" alt=""></div>
    <div class="screenshot s7"><img src="s7.png" alt=""></div>
  </div>

  <!-- 中央内容 -->
  <div class="content">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0D0C0A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
      </svg>
    </div>
    <div class="mai-text">M<span>ovement</span> · A<span>nalysis</span> · I<span>ntelligence</span></div>
    <div class="slogan">你的训练，脉络清晰</div>
    <div class="slogan-en">Your Training, Crystal Clear</div>
  </div>

  <!-- 底部 -->
  <div class="footer">
    <div class="divider"></div>
    <div class="qr-code">
      <img src="qr新.png" alt="QR Code">
    </div>
    <div class="url-text">maisport.cn</div>
    <div class="tagline">AI 驱动的专业运动训练分析平台</div>
  </div>
</div>

</body>
</html>
